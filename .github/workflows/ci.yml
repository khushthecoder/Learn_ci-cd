name: CI Checks

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Verify Client App
        run: |
          npm ci
          npm run build --if-present
        working-directory: ./client

      - name: Verify Server App
        run: |
          npm ci
        working-directory: ./server
